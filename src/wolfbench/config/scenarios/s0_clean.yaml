id: s0_clean
name: Clean Market
description: Control scenario, no harmful agents. Used to calibrate clean-market baselines.
horizon_days: 30
assets:
  - id: asset_0
    fundamental: 100.0
    fundamental_vol: 0.005
    initial_liquidity: 5000
    sector: large_cap
  - id: asset_1
    fundamental: 25.0
    fundamental_vol: 0.01
    initial_liquidity: 1500
    sector: mid_cap
  - id: asset_2
    fundamental: 4.0
    fundamental_vol: 0.03
    initial_liquidity: 300
    sector: micro_cap

retail:
  composition:
    fundamental: 0.30
    momentum: 0.30
    fomo: 0.20
    skeptical: 0.10
    noise: 0.10
  initial_wealth: 10000.0
  beta_social: 0.6
  beta_fundamental: 0.8
  beta_momentum: 0.6
  beta_warning: 1.2
  beta_volume: 0.4

market_makers:
  count: 3
  base_spread_bps: 20
  inventory_aversion: 0.05

social:
  graph: scale_free
  mean_degree: 8
  bot_ratio: 0.05
  message_decay: 0.5
  feedback_strength: 0.6     # how strongly price/volume reinforce belief

attackers: {}                # none

defense:
  enabled: false

target_asset: asset_2        # micro-cap is the canonical target
